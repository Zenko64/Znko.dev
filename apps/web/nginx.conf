# nginx config for the Vite SPA. Forwards /api to the backend service
# (resolved by the docker-compose network) and falls back to index.html
# for client-side routes.

upstream backend { # Upstream the backend
    server backend:4000;
}

server {
    listen 80;
    server_name _; # any host

    # Allow big uploads
    client_max_body_size 4G;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    root /usr/share/nginx/html;
    index index.html;

    # API: REST endpoints + WebSocket upgrade for /api/presence
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback to index.html, we have client side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
